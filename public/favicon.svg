<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Fondo verde redondeado -->
  <rect width="32" height="32" rx="6" fill="#16a34a"/>
  
  <!-- Candlestick chart - 3 velas -->
  <!-- Vela 1 (izquierda, bajista) -->
  <line x1="8" y1="7" x2="8" y2="10" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="5.5" y="10" width="5" height="7" rx="1" fill="white" opacity="0.6"/>
  <line x1="8" y1="17" x2="8" y2="21" stroke="white" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Vela 2 (centro, alcista) -->
  <line x1="16" y1="8" x2="16" y2="12" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="13.5" y="12" width="5" height="9" rx="1" fill="white"/>
  <line x1="16" y1="21" x2="16" y2="25" stroke="white" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Vela 3 (derecha, alcista grande) -->
  <line x1="24" y1="5" x2="24" y2="9" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="21.5" y="9" width="5" height="12" rx="1" fill="white"/>
  <line x1="24" y1="21" x2="24" y2="26" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
</svg>
